<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Maskan Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--s1:#0D1018;--s2:#121621;--s3:#171D2B;--bd:#1C2538;
  --gold:#C9A463;--gdim:#7A5C2E;--gbg:#C9A46314;
  --teal:#2DD4BF;--tbg:#2DD4BF10;
  --green:#34D399;--gnbg:#34D39910;
  --red:#F87171;--rbg:#F8717110;
  --yellow:#FBBF24;--ybg:#FBBF2410;
  --orange:#FB923C;--obg:#FB923C10;
  --purple:#A78BFA;--pbg:#A78BFA10;
  --mint:#6EE7B7;
  --sub:#4E6480;--txt2:#7A94AD;--txt:#E2EAF4;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ─── HEADER ─── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(7,9,15,.9);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
  padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px}
.bi{width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gdim));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#07090F;letter-spacing:-.02em}
.bn{font-size:15px;font-weight:800;letter-spacing:-.02em}
.bn em{color:var(--gold);font-style:normal}
.bs{font-size:9px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;
  border-radius:20px;background:var(--gnbg);border:1px solid #34D39928}
.lpulse{width:5px;height:5px;border-radius:50%;background:var(--green);
  animation:pulse 1.4s ease-in-out infinite}
.ltxt{font-size:9px;font-weight:700;color:var(--green);
  letter-spacing:.08em;text-transform:uppercase}
.clk{font-size:12px;font-weight:600;color:var(--gold);
  font-family:'DM Mono',monospace;letter-spacing:.04em}
.sync-lbl{font-size:9px;color:var(--sub);text-align:right}

/* ─── MAIN ─── */
.main{padding:16px 18px;display:flex;flex-direction:column;gap:16px;
  animation:fadeUp .3s ease}

/* ─── SECTION LABEL ─── */
.slbl{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.slbl-r{font-size:9px;color:var(--sub);font-weight:400;
  letter-spacing:0;text-transform:none}

/* ─── CARD ─── */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}

/* ─── LIVE BANNER ─── */
.banner{
  border-radius:14px;padding:20px 18px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,#0E1B2E 0%,#0D1018 55%,#12161F 100%);
  border:1px solid var(--gold)2A;
}
.banner::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,var(--gold)07 0%,transparent 70%);
  pointer-events:none;
}
.b-top{display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;margin-bottom:18px}
.b-name{font-size:17px;font-weight:800;color:var(--txt);line-height:1.3;flex:1;min-width:0}
.b-live{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:20px;background:var(--gnbg);border:1px solid #34D39928;flex-shrink:0}
.b-live .lpulse{width:6px;height:6px}
.b-live span{font-size:9px;font-weight:700;color:var(--green);
  text-transform:uppercase;letter-spacing:.07em}

/* KPI row */
.b-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.bk{background:rgba(255,255,255,.035);border:1px solid var(--bd);
  border-radius:10px;padding:12px 14px}
.bk-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;
  line-height:1;margin-bottom:4px}
.bk-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.bk-sub{font-size:10px;color:var(--txt2);margin-top:3px}

/* today vs avg strip */
.b-today{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.025);border:1px solid var(--bd);
  margin-bottom:14px;
}
.bt-item{text-align:center}
.bt-val{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.bt-lbl{font-size:9px;color:var(--sub);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* footer row */
.b-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding-top:14px;border-top:1px solid var(--bd)88}
.bf-item{display:flex;align-items:center;gap:5px}
.bf-lbl{font-size:10px;color:var(--sub)}
.bf-val{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.freq-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}

/* ─── NO LIVE ─── */
.no-live{text-align:center;padding:32px;color:var(--sub);font-size:13px;
  border:1px dashed var(--bd);border-radius:14px}

/* ─── HISTORY SUMMARY ─── */
.hist-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;
  padding:14px 16px;text-align:center}
.hc-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;
  line-height:1;margin-bottom:4px}
.hc-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.hc-sub{font-size:10px;color:var(--txt2);margin-top:3px}

/* ─── FUNNEL ─── */
.funnel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fcol{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.fcol-hd{font-size:12px;font-weight:700;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--bd);
  display:flex;justify-content:space-between;align-items:center}
.fcol-hd-n{font-size:9px;color:var(--sub);font-weight:400}
.fi{display:flex;align-items:center;gap:7px;padding:3px 0}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fi-name{font-size:11px;color:var(--txt);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-bar-w{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;max-width:72px}
.fi-bar{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.fi-n{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;
  width:20px;text-align:right;flex-shrink:0}
.fi-p{font-size:9px;color:var(--sub);width:28px;text-align:right;flex-shrink:0}
.qrate{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);
  display:flex;justify-content:space-between;align-items:center}
.qrate-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.qrate-val{font-size:18px;font-weight:900;font-family:'DM Mono',monospace}

/* deal outcome */
.deal-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;border-radius:7px;margin-top:6px}
.deal-lbl{font-size:11px}
.deal-sub{font-size:9px;color:var(--sub);margin-top:1px}
.deal-n{font-size:15px;font-weight:900;font-family:'DM Mono',monospace}

/* ─── COMPARISON ─── */
.cmp-row{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--bd)55}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{font-size:12px;color:var(--txt2);width:100px;flex-shrink:0}
.cmp-cur{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;flex:1}
.cmp-hist{font-size:10px;color:var(--sub);flex:1}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;
  white-space:nowrap;flex-shrink:0}
.b-good{background:var(--gnbg);color:var(--green);border:1px solid #34D39928}
.b-warn{background:var(--ybg);color:var(--yellow);border:1px solid #FBBF2428}
.b-bad {background:var(--rbg);color:var(--red);border:1px solid #F8717128}
.b-neu {background:var(--s3);color:var(--sub);border:1px solid var(--bd)}

/* ─── PIPELINE ─── */
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pg{background:var(--s2);border:1px solid var(--bd);border-radius:12px;
  padding:14px 16px;text-align:center}
.pg-val{font-size:24px;font-weight:900;font-family:'DM Mono',monospace;
  line-height:1;margin-bottom:4px}
.pg-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}

/* ─── LOADING ─── */
.loading{display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:14px}
.spinner{width:32px;height:32px;border:2px solid var(--bd);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}

/* ─── FOOTER ─── */
.ftr{border-top:1px solid var(--bd);padding:10px 18px;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;background:var(--s1);font-size:9px;color:var(--sub);
  padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.ref-btn{background:transparent;border:1px solid var(--bd);border-radius:5px;
  padding:4px 10px;color:var(--sub);font-size:9px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s}
.ref-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ─── RESPONSIVE ─── */
@media(max-width:680px){
  .b-kpis{grid-template-columns:repeat(2,1fr)}
  .b-today{grid-template-columns:repeat(3,1fr)}
  .hist-row{grid-template-columns:1fr 1fr}
  .funnel-grid{grid-template-columns:1fr}
  .pipe-grid{grid-template-columns:repeat(2,1fr)}
  .b-name{font-size:14px}
}
@media(max-width:380px){
  .b-kpis{grid-template-columns:repeat(2,1fr)}
  .bk-val{font-size:18px}
  .hist-row{grid-template-columns:1fr}
  .pipe-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:12px 14px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">
    <div class="bi">M</div>
    <div>
      <div class="bn">Maskan <em>Command</em></div>
      <div class="bs">Campaign & Sales Dashboard</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="live-pill"><div class="lpulse"></div><span class="ltxt">Live</span></div>
    <div>
      <div class="clk" id="clk">--:--:--</div>
      <div class="sync-lbl" id="sync" style="transition:color .3s">Connecting...</div>
    </div>
  </div>
</div>

<div id="root">
  <div class="loading"><div class="spinner"></div><p style="color:var(--sub);font-size:12px">Connecting to live data...</p></div>
</div>

<div class="ftr">
  <span>Maskan Real Estate Consultancy · Internal Use Only</span>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="ftr-clk"></span>
    <button class="ref-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// FALLBACK — real numbers, replaced when API responds
// ═══════════════════════════════════════════════
const FB_CAMPS = [
  {id:'120255442485670777',name:'G & Ora Developments Resale Campaign - Jun/Jul 26',

  {id:'120234944361970777',name:'Summer 2025',
   status:'PAUSED',isDelivering:false,startTime:'2025-06-29T20:00:00+0300',

   freq:2.99,imp:168768,reach:56447,clicks:2212,daysToFatigue:null,today:null},
  {id:'120252475263620777',name:'Palm Hills Ras El Hekma Launch May 2026',
   status:'COMPLETED',isDelivering:false,startTime:'2026-05-21T21:27:40+0300',
   daysRunning:41,dailyAvg:213,spend:8729,leads:11,cpl:794,ctr:1.25,cpm:211,
   freq:1.85,imp:41319,reach:22387,clicks:515,daysToFatigue:null,today:null},
  {id:'120251878682060777',name:'North Coast Resale Units May 2026',
   status:'COMPLETED',isDelivering:false,startTime:'2026-05-12T17:31:32+0300',
   daysRunning:50,dailyAvg:182,spend:9099,leads:13,cpl:700,ctr:1.78,cpm:229,
   freq:2.33,imp:39670,reach:17025,clicks:705,daysToFatigue:null,today:null},

const FB_HS = {
  total:216,
  overall:{
    'Not Interested':75,'No Answer':41,'Qualified':29,'Unqualified':26,
    "Didn't Sign Up":19,'Reseller':14,'Bought Elsewhere':4,
    'Site Visit':2,'Meeting':2,'Already Bought':1,'Done Deal':1
  },
  byCampaign:{
    'G & Ora Developments Resale Campaign - Jun/Jul 26':
      {'Qualified':6,'No Answer':2,'Reseller':1,'Not Interested':1},
    'Emaar - Cairo Gate Resale - May 2026':
      {'Qualified':5,'Meeting':1,'No Answer':4,'Not Interested':3,'Unqualified':3,"Didn't Sign Up":1},
    'Resale Units - Marina 5 Villa & Hacienda bay - Apr 2026':
      {'Qualified':4,'No Answer':3,'Not Interested':5,'Unqualified':4,'Reseller':1,"Didn't Sign Up":2},
    'Sodic - Vye & Karmell Resale - Feb 2026':

    'Summer 2025':
      {'Not Interested':30,'No Answer':20,'Qualified':8,'Unqualified':8,"Didn't Sign Up":7,'Reseller':4,'Bought Elsewhere':2,'Site Visit':2,'Done Deal':1},
    'North Coast - Resale Units - May 2026':
      {'Qualified':5,'Not Interested':2,'No Answer':1,'Reseller':2,'Unqualified':2,"Didn't Sign Up":1},
    'Palm Hills - Ras El Hekma Launch - May 2026':
      {'Qualified':1,'Not Interested':2,'No Answer':2,'Unqualified':2,'Bought Elsewhere':1,"Didn't Sign Up":1,'Reseller':0},
    'Palm Hills - Village De La Capitale - Feb 2026':
      {'Not Interested':4,'No Answer':2,"Didn't Sign Up":3,'Already Bought':1},
  }
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = { camps: FB_CAMPS, hs: FB_HS, lastSync: null };

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fEGP = n => 'EGP ' + Math.round(n).toLocaleString('en');
const fK   = n => n>=1000 ? (n/1000).toFixed(1)+'K' : String(n);
const pct  = (a,b) => b>0 ? Math.round(a/b*100) : 0;

const ctrC = v => v>=1.5?'var(--green)':v>=1.0?'var(--yellow)':'var(--red)';
const cplC = v => v<600?'var(--green)':v<900?'var(--yellow)':'var(--red)';
const freqC= v => v>=2.5?'var(--red)':v>=2.0?'var(--yellow)':'var(--green)';

const STAGE = {
  'Qualified':      '#2DD4BF',
  'Meeting':        '#C9A463',
  'Site Visit':     '#FBBF24',
  'Done Deal':      '#34D399',
  'Already Bought': '#6EE7B7',
  'Bought Elsewhere':'#F87171',
  'Reseller':       '#A78BFA',
  'No Answer':      '#3D5068',
  'Not Interested': '#F87171',
  'Unqualified':    '#F87171',
  "Didn't Sign Up": '#2A3A50',
  'Unknown':        '#2A3A50',
};

// ═══════════════════════════════════════════════
// DATA LOAD
// ═══════════════════════════════════════════════
let metaLive = false;
let hubspotLive = false;

async function loadAll() {
  const syncEl = document.getElementById('sync');
  syncEl.textContent = 'Syncing...';
  syncEl.style.color = 'var(--yellow)';

  // META
  try {
    const mr = await fetch('/api/meta', { cache: 'no-store' });
    if (!mr.ok) throw new Error(`Meta API ${mr.status}`);
    const md = await mr.json();
    if (md.error) throw new Error(md.error);
    if (md.campaigns?.length) {
      S.camps = md.campaigns;
      metaLive = true;
    }
  } catch(e) {
    console.warn('Meta API failed:', e.message);
    metaLive = false;
  }

  // HUBSPOT
  try {
    const hr = await fetch('/api/hubspot', { cache: 'no-store' });
    if (!hr.ok) throw new Error(`HubSpot API ${hr.status}`);
    const hd = await hr.json();
    if (hd.error) throw new Error(hd.error);
    if (hd.contacts?.length) {
      const overall = {}, byCampaign = {};
      hd.contacts.forEach(c => {
        const st = c.leadStage || 'Unknown';
        overall[st] = (overall[st] || 0) + 1;
        if (c.campaign) {
          if (!byCampaign[c.campaign]) byCampaign[c.campaign] = {};
          byCampaign[c.campaign][st] = (byCampaign[c.campaign][st] || 0) + 1;
        }
      });
      S.hs = { total: hd.total, overall, byCampaign };
      hubspotLive = true;
    }
  } catch(e) {
    console.warn('HubSpot API failed:', e.message);
    hubspotLive = false;
  }

  S.lastSync = new Date();
  const t = S.lastSync.toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});

  if (metaLive && hubspotLive) {
    syncEl.textContent = '✓ Live · ' + t;
    syncEl.style.color = 'var(--green)';
  } else if (metaLive || hubspotLive) {
    syncEl.textContent = '⚠ Partial · ' + t;
    syncEl.style.color = 'var(--yellow)';
  } else {
    syncEl.textContent = '✗ Cached · ' + t;
    syncEl.style.color = 'var(--red)';
  }

  render();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  // Only campaigns actually spending today — check both isDelivering flag
  // AND delivery substatuses from API (not just effective_status)
  const live = S.camps.filter(c =>
    c.isDelivering === true ||
    (c.status === 'ACTIVE' && c.today?.spend > 0)
  );

  // ALL campaigns with leads for historical totals (include active too)
  const allWithLeads = S.camps.filter(c => c.leads > 0);
  const histTotalLeads = allWithLeads.reduce((s,c)=>s+c.leads,0);
  const histTotalSpend = allWithLeads.reduce((s,c)=>s+c.spend,0);

  // For averages use only past/paused campaigns (not current active)
  const pastCamps = S.camps.filter(c =>
    (c.status === 'PAUSED' || c.status === 'COMPLETED') && c.leads > 0
  );
  const histAvgCPL = pastCamps.length
    ? Math.round(pastCamps.reduce((s,c)=>s+c.cpl,0)/pastCamps.length) : 0;
  const histBestCPL = pastCamps.length ? Math.min(...pastCamps.map(c=>c.cpl)) : 0;
  const histAvgCTR  = pastCamps.length
    ? (pastCamps.reduce((s,c)=>s+c.ctr,0)/pastCamps.length).toFixed(2) : 0;

  // Overall HS
  const ov = S.hs.overall;
  const tot = S.hs.total;
  const hotPipe = (ov['Qualified']||0)+(ov['Meeting']||0)+(ov['Site Visit']||0);
  const closed  = (ov['Done Deal']||0)+(ov['Already Bought']||0);
  const lost    = (ov['Not Interested']||0)+(ov['Bought Elsewhere']||0);
  const noAns   = ov['No Answer']||0;

  document.getElementById('root').innerHTML = `<div class="main">

    <!-- ① LIVE BANNERS — only truly delivering -->
    ${live.length===0
      ? `<div class="no-live">
          <div style="font-size:24px;margin-bottom:8px">📴</div>
          No campaigns currently spending · Check Ads Manager
        </div>`
      : live.map(c => banner(c, histAvgCPL, histAvgCTR, histBestCPL)).join('')
    }

    <!-- ② ALL CAMPAIGNS TABLE -->
    <div class="card">
      <div class="slbl">All Campaigns · ${S.camps.length} Total
        <span class="slbl-r">Active → Paused → Completed</span>
      </div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr>
              <th style="font-size:9px;color:var(--sub);text-transform:uppercase;
                letter-spacing:.08em;padding:5px 8px;text-align:left;
                border-bottom:1px solid var(--bd)">Campaign</th>
              <th style="font-size:9px;color:var(--sub);text-transform:uppercase;
                letter-spacing:.08em;padding:5px 8px;text-align:center;
                border-bottom:1px solid var(--bd)">Leads</th>
              <th style="font-size:9px;color:var(--sub);text-transform:uppercase;
                letter-spacing:.08em;padding:5px 8px;text-align:center;
                border-bottom:1px solid var(--bd)">CPL</th>
              <th style="font-size:9px;color:var(--sub);text-transform:uppercase;
                letter-spacing:.08em;padding:5px 8px;text-align:center;
                border-bottom:1px solid var(--bd)">CTR</th>
              <th style="font-size:9px;color:var(--sub);text-transform:uppercase;
                letter-spacing:.08em;padding:5px 8px;text-align:center;
                border-bottom:1px solid var(--bd)">Engagements</th>
            </tr>
          </thead>
          <tbody>
            ${[...S.camps].sort((a,b)=>{
              const o={ACTIVE:0,PAUSED:1,COMPLETED:2};
              return (o[a.status]??3)-(o[b.status]??3)||b.leads-a.leads;
            }).map(c=>{
              const sc = c.status==='ACTIVE'
                ? {col:'#34D399',bg:'#34D39912',lbl:'ACTIVE'}
                : c.status==='PAUSED'
                ? {col:'#FBBF24',bg:'#FBBF2412',lbl:'PAUSED'}
                : {col:'#5A7090',bg:'#5A709012',lbl:'COMPLETED'};
              const engagements = c.clicks || 0;
              const engColor = engagements>=500?'var(--teal)':engagements>=200?'var(--txt)':'var(--sub)';
              return `<tr style="border-bottom:1px solid #1C253810">
                <td style="padding:8px;vertical-align:middle">
                  <div style="font-size:11px;font-weight:600;color:var(--txt);
                    line-height:1.3;margin-bottom:3px">
                    ${c.name.length>34?c.name.slice(0,34)+'…':c.name}
                  </div>
                  <span style="display:inline-block;font-size:9px;font-weight:700;
                    padding:1px 6px;border-radius:3px;letter-spacing:.04em;
                    background:${sc.bg};color:${sc.col};border:1px solid ${sc.col}28">
                    ${sc.lbl}
                  </span>
                </td>
                <td style="text-align:center;font-family:'DM Mono',monospace;
                  font-weight:700;font-size:12px;color:var(--teal);padding:8px">
                  ${c.leads}
                </td>
                <td style="text-align:center;font-family:'DM Mono',monospace;
                  font-weight:700;font-size:12px;padding:8px;
                  color:${cplC(c.cpl)}">
                  ${fEGP(c.cpl)}
                </td>
                <td style="text-align:center;font-family:'DM Mono',monospace;
                  font-weight:700;font-size:12px;padding:8px;
                  color:${ctrC(c.ctr)}">
                  ${c.ctr.toFixed(2)}%
                </td>
                <td style="text-align:center;font-family:'DM Mono',monospace;
                  font-weight:700;font-size:12px;padding:8px;
                  color:${engColor}">
                  ${engagements>=1000?(engagements/1000).toFixed(1)+'K':engagements}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- ③ HISTORICAL SUMMARY — 3 clean numbers -->
    <div>
      <div class="slbl">All Campaigns · Historical Summary
        <span class="slbl-r">${S.camps.length} total campaigns</span>
      </div>
      <div class="hist-row">
        <div class="hc">
          <div class="hc-val" style="color:var(--teal)">${histTotalLeads}</div>
          <div class="hc-lbl">Total Leads Ever</div>
          <div class="hc-sub">Across all campaigns</div>
        </div>
        <div class="hc">
          <div class="hc-val" style="color:var(--gold)">${fEGP(histTotalSpend)}</div>
          <div class="hc-lbl">Total Spent Ever</div>
          <div class="hc-sub">All time</div>
        </div>
        <div class="hc">
          <div class="hc-val" style="color:${cplC(histAvgCPL)}">${fEGP(histAvgCPL)}</div>
          <div class="hc-lbl">Avg CPL Historical</div>
          <div class="hc-sub">Best ever ${fEGP(Math.round(histBestCPL))}</div>
        </div>
      </div>
    </div>

    <!-- ④ LEAD STAGE BREAKDOWN -->
    <div>
      <div class="slbl">Lead Stage Breakdown
        <span class="slbl-r">Current campaign vs All time</span>
      </div>
      <div class="funnel-grid">
        ${funnelCol(
          live[0]?.name||'Current Campaign',
          live[0] ? (S.hs.byCampaign?.[live[0].name]||{}) : {},
          live[0]?.leads||0,
          'Current Campaign',
          'var(--gold)'
        )}
        ${funnelCol('All Time', ov, tot, 'All Campaigns', 'var(--teal)')}
      </div>
    </div>

    <!-- ⑤ CURRENT vs HISTORICAL COMPARISON -->
    ${live.length>0 ? `
    <div class="card">
      <div class="slbl" style="margin-bottom:14px">Current Campaign vs Historical
        <span class="slbl-r">Key metrics</span>
      </div>
      ${comparison(live[0], histAvgCPL, histAvgCTR, histBestCPL)}
    </div>` : ''}

    <!-- ⑥ SALES PIPELINE HEALTH -->
    <div>
      <div class="slbl">Sales Pipeline Health
        <span class="slbl-r">${tot} total contacts in HubSpot</span>
      </div>
      <div class="pipe-grid">
        <div class="pg" style="border-color:var(--teal)22;background:var(--tbg)">
          <div class="pg-val" style="color:var(--teal)">${hotPipe}</div>
          <div class="pg-lbl">Hot Pipeline</div>
        </div>
        <div class="pg" style="border-color:var(--green)22;background:var(--gnbg)">
          <div class="pg-val" style="color:var(--green)">${closed}</div>
          <div class="pg-lbl">Closed</div>
        </div>
        <div class="pg" style="border-color:var(--red)22;background:var(--rbg)">
          <div class="pg-val" style="color:var(--red)">${lost}</div>
          <div class="pg-lbl">Lost</div>
        </div>
        <div class="pg">
          <div class="pg-val" style="color:var(--sub)">${noAns}</div>
          <div class="pg-lbl">No Answer</div>
        </div>
      </div>
      <!-- Qualify rate bar -->
      <div style="margin-top:10px;padding:12px 16px;border-radius:10px;
        background:var(--s2);border:1px solid var(--bd)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;color:var(--txt2)">Overall Qualify Rate</span>
          <span style="font-size:13px;font-weight:800;color:var(--teal);
            font-family:'DM Mono',monospace">${pct(hotPipe,tot)}%</span>
        </div>
        <div style="height:6px;background:var(--bd);border-radius:3px;overflow:hidden">
          <div style="width:${pct(hotPipe,tot)}%;height:100%;background:var(--teal);
            border-radius:3px;transition:width .7s ease"></div>
        </div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--mint)"></div>
            <span style="font-size:9px;color:var(--sub)">Already Bought = not Maskan's loss</span>
          </div>
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--red)"></div>
            <span style="font-size:9px;color:var(--sub)">Bought Elsewhere = lost to competitor</span>
          </div>
        </div>
      </div>
    </div>

  </div>`;
}

// ─── BANNER ───────────────────────────────────
function banner(c, histAvgCPL, histAvgCTR, histBestCPL) {
  const t = c.today;
  const fc = freqC(c.freq);
  const fwBg = c.freq>=2.5?'var(--rbg)':c.freq>=2.0?'var(--ybg)':'var(--gnbg)';
  const fwTxt= c.freq>=2.5?'⚠️ Fatigue risk':c.freq>=2.0?'⚡ Watch closely':'✓ Healthy';
  const todayCPL = t && t.leads>0 ? Math.round(t.spend/t.leads) : null;
  const todayVsAvg = todayCPL
    ? (todayCPL < c.cpl
        ? `<span style="color:var(--green);font-size:10px">↓ Better than avg</span>`
        : `<span style="color:var(--red);font-size:10px">↑ Above avg</span>`)
    : '';

  // Burn rate
  const burnPct = c.dailyAvg > 0 && t
    ? Math.round(t.spend / c.dailyAvg * 100) : null;

  return `<div class="banner">
    <div class="b-top">
      <div class="b-name">${c.name}</div>
      <div class="b-live"><div class="lpulse"></div><span>LIVE</span></div>
    </div>

    <div class="b-kpis">
      <div class="bk">
        <div class="bk-val" style="color:var(--teal)">${c.leads}</div>
        <div class="bk-lbl">Total Leads</div>
        ${t ? `<div class="bk-sub">+${t.leads} today</div>` : ''}
      </div>
      <div class="bk">
        <div class="bk-val" style="color:${cplC(c.cpl)}">${fEGP(c.cpl)}</div>
        <div class="bk-lbl">Cost Per Lead</div>
        ${todayCPL ? `<div class="bk-sub">${fEGP(todayCPL)} today ${todayVsAvg}</div>` : ''}
      </div>
      <div class="bk">
        <div class="bk-val" style="color:${ctrC(c.ctr)}">${c.ctr.toFixed(2)}%</div>
        <div class="bk-lbl">CTR</div>
        ${t ? `<div class="bk-sub">${t.ctr.toFixed(2)}% today</div>` : ''}
      </div>
      <div class="bk">
        <div class="bk-val" style="color:var(--gold)">${fEGP(c.spend)}</div>
        <div class="bk-lbl">Total Spend</div>
        ${t ? `<div class="bk-sub">${fEGP(t.spend)} today</div>` : ''}
      </div>
    </div>

    <!-- Today vs campaign avg strip -->
    ${t ? `<div class="b-today">
      <div class="bt-item">
        <div class="bt-val" style="color:var(--txt2)">${fEGP(c.dailyAvg)}</div>
        <div class="bt-lbl">Daily avg spend</div>
      </div>
      <div class="bt-item">
        <div class="bt-val" style="color:${t.spend >= c.dailyAvg*0.8 ? 'var(--green)':'var(--yellow)'}">
          ${fEGP(t.spend)}
        </div>
        <div class="bt-lbl">Spent today</div>
      </div>
      <div class="bt-item">
        <div class="bt-val" style="color:${burnPct && burnPct>=70?'var(--green)':'var(--yellow)'}">
          ${burnPct !== null ? burnPct+'%' : '—'}
        </div>
        <div class="bt-lbl">Pace vs avg</div>
      </div>
    </div>` : ''}

    <div class="b-foot">
      <div class="bf-item">
        <span class="bf-lbl">Frequency</span>
        <span class="bf-val" style="color:${fc}">${c.freq.toFixed(2)}x</span>
      </div>
      <span class="freq-pill" style="background:${fwBg};color:${fc};
        border:1px solid ${fc}28">${fwTxt}</span>
      ${c.daysToFatigue !== null && c.daysToFatigue <= 5
        ? `<span class="freq-pill" style="background:var(--ybg);color:var(--yellow);
            border:1px solid var(--yellow)28">~${c.daysToFatigue}d to 2.5x</span>`
        : ''}
      <div class="bf-item" style="margin-left:auto">
        <span class="bf-lbl">CPM</span>
        <span class="bf-val">${fEGP(c.cpm)}</span>
      </div>
      <div class="bf-item">
        <span class="bf-lbl">Day</span>
        <span class="bf-val" style="color:var(--sub)">${c.daysRunning}</span>
      </div>
      <div class="bf-item">
        <span class="bf-lbl">Reach</span>
        <span class="bf-val">${fK(c.reach)}</span>
      </div>
    </div>
  </div>`;
}

// ─── FUNNEL COL ───────────────────────────────
function funnelCol(name, stages, total, label, accent) {
  const entries = Object.entries(stages).filter(([,v])=>v>0)
    .sort((a,b)=>b[1]-a[1]);
  const hot = (stages['Qualified']||0)+(stages['Meeting']||0)+(stages['Site Visit']||0);
  const qr  = pct(hot, total);
  const boughtElsewhere = stages['Bought Elsewhere']||0;
  const alreadyBought   = stages['Already Bought']||0;

  return `<div class="fcol">
    <div class="fcol-hd" style="color:${accent}">
      ${label} <span class="fcol-hd-n">${total} leads</span>
    </div>
    ${total===0
      ? `<div style="color:var(--sub);font-size:11px;text-align:center;padding:20px">No leads yet</div>`
      : entries.map(([s,n]) => {
          const c = STAGE[s]||'#3D5068';
          const p = pct(n,total);
          return `<div class="fi">
            <div class="fi-dot" style="background:${c}"></div>
            <div class="fi-name">${s}</div>
            <div class="fi-bar-w"><div class="fi-bar" style="width:${p}%;background:${c}"></div></div>
            <div class="fi-n" style="color:${c}">${n}</div>
            <div class="fi-p">${p}%</div>
          </div>`;
        }).join('')
    }
    <div class="qrate">
      <span class="qrate-lbl">Qualify Rate</span>
      <span class="qrate-val" style="color:${accent}">${qr}%</span>
    </div>
    ${alreadyBought||boughtElsewhere ? `
      ${alreadyBought?`<div class="deal-row" style="background:var(--gnbg);border-left:2px solid var(--mint)">
        <div><div class="deal-lbl" style="color:var(--txt)">Already Bought</div>
        <div class="deal-sub">Came in after buying · not our loss</div></div>
        <div class="deal-n" style="color:var(--mint)">${alreadyBought}</div>
      </div>`:''}
      ${boughtElsewhere?`<div class="deal-row" style="background:var(--rbg);border-left:2px solid var(--red)">
        <div><div class="deal-lbl" style="color:var(--txt)">Bought Elsewhere</div>
        <div class="deal-sub">Worked by Maskan · lost to competitor</div></div>
        <div class="deal-n" style="color:var(--red)">${boughtElsewhere}</div>
      </div>`:''}`:''}
  </div>`;
}

// ─── COMPARISON ───────────────────────────────
function comparison(c, histAvgCPL, histAvgCTR, histBestCPL) {
  const ov = S.hs.overall;
  const tot= S.hs.total;
  const histQR = pct((ov['Qualified']||0)+(ov['Meeting']||0)+(ov['Site Visit']||0), tot);
  const curStages = S.hs.byCampaign?.[c.name]||{};
  const curHot = (curStages['Qualified']||0)+(curStages['Meeting']||0)+(curStages['Site Visit']||0);
  const curQR  = pct(curHot, c.leads||1);

  const rows = [
    {
      lbl:'CPL',
      cur:fEGP(Math.round(c.cpl)),
      hist:`Hist avg ${fEGP(histAvgCPL)} · Best ${fEGP(Math.round(histBestCPL))}`,
      badge: c.cpl<=histBestCPL ? {t:'🏆 Best ever',cls:'b-good'}
           : c.cpl<histAvgCPL   ? {t:'↓ Better than avg',cls:'b-good'}
           :                      {t:'↑ Above avg',cls:'b-bad'},
      color: cplC(c.cpl),
    },
    {
      lbl:'CTR',
      cur:c.ctr.toFixed(2)+'%',
      hist:`Hist avg ${histAvgCTR}%`,
      badge: c.ctr>parseFloat(histAvgCTR) ? {t:'↑ Above avg',cls:'b-good'}
                                           : {t:'↓ Below avg',cls:'b-bad'},
      color: ctrC(c.ctr),
    },
    {
      lbl:'Qualify Rate',
      cur:curQR+'%',
      hist:`${histQR}% account average`,
      badge: curQR>histQR ? {t:'↑ Better quality',cls:'b-good'}
                          : {t:'↓ Below avg',cls:'b-warn'},
      color: curQR>histQR?'var(--green)':'var(--yellow)',
    },
    {
      lbl:'Frequency',
      cur:c.freq.toFixed(2)+'x',
      hist:`Concern >2.5x · Warning >2.0x`,
      badge: c.freq>=2.5 ? {t:'⚠️ Fatigue risk',cls:'b-bad'}
           : c.freq>=2.0  ? {t:'⚡ Watch',cls:'b-warn'}
           :                {t:'✓ Healthy',cls:'b-good'},
      color: freqC(c.freq),
    },
    {
      lbl:'Days Running',
      cur:c.daysRunning+'d',
      hist:`Daily avg spend ${fEGP(c.dailyAvg)}`,
      badge: c.daysRunning<=7 ? {t:'🆕 New',cls:'b-neu'}
                              : {t:'Established',cls:'b-neu'},
      color:'var(--txt)',
    },
  ];

  return rows.map(r=>`
    <div class="cmp-row">
      <span class="cmp-lbl">${r.lbl}</span>
      <span class="cmp-cur" style="color:${r.color}">${r.cur}</span>
      <span class="cmp-hist">${r.hist}</span>
      <span class="badge ${r.badge.cls}">${r.badge.t}</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
function tick() {
  const t = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clk').textContent = t;
  const f = document.getElementById('ftr-clk');
  if(f) f.textContent = 'Auto-refresh 5min · '+t;
}

// ═══════════════════════════════════════════════
// INIT — render fallback immediately, then fetch
// ═══════════════════════════════════════════════
render();
document.getElementById('sync').textContent = 'Using cached data — syncing...';
tick();
setInterval(tick, 1000);
loadAll();
setInterval(loadAll, 5*60*1000);
</script>
</body>
</html>
