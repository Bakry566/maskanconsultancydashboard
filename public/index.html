<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Maskan Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--s1:#0D1018;--s2:#121621;--s3:#171D2B;--bd:#1C2538;
  --gold:#C9A463;--gdim:#7A5C2E;--gbg:#C9A46314;
  --teal:#2DD4BF;--tbg:#2DD4BF10;
  --green:#34D399;--gnbg:#34D39910;
  --red:#F87171;--rbg:#F8717110;
  --yellow:#FBBF24;--ybg:#FBBF2410;
  --orange:#FB923C;--obg:#FB923C10;
  --purple:#A78BFA;--pbg:#A78BFA10;
  --mint:#6EE7B7;
  --sub:#4E6480;--txt2:#7A94AD;--txt:#E2EAF4;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.bi{width:36px;height:36px;border-radius:7px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px}
.bi img{width:100%;height:100%;object-fit:contain}
.bn{font-size:15px;font-weight:800;letter-spacing:-.02em}
.bn em{color:var(--gold);font-style:normal}
.bs{font-size:9px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:var(--gnbg);border:1px solid #34D39928}
.lpulse{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite}
.ltxt{font-size:9px;font-weight:700;color:var(--green);letter-spacing:.08em;text-transform:uppercase}
.clk{font-size:12px;font-weight:600;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:.04em}
.sync-lbl{font-size:9px;color:var(--sub);text-align:right;transition:color .3s}
.main{padding:16px 18px;display:flex;flex-direction:column;gap:14px;animation:fadeUp .3s ease}
.slbl{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.slbl-r{font-size:9px;color:var(--sub);font-weight:400;letter-spacing:0;text-transform:none}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.banner{border-radius:14px;padding:20px 18px;position:relative;overflow:hidden;background:linear-gradient(155deg,#0E1B2E 0%,#0D1018 55%,#12161F 100%);border:1px solid var(--gold)2A}
.banner::after{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,var(--gold)07 0%,transparent 70%);pointer-events:none}
.b-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.b-name{font-size:17px;font-weight:800;color:var(--txt);line-height:1.3;flex:1;min-width:0}
.b-live{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--gnbg);border:1px solid #34D39928;flex-shrink:0}
.b-live .lpulse{width:6px;height:6px}
.b-live span{font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.07em}
.b-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.bk{background:rgba(255,255,255,.035);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.bk-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.bk-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.bk-sub{font-size:10px;color:var(--txt2);margin-top:3px}
.b-today{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--bd);margin-bottom:14px}
.bt-item{text-align:center}
.bt-val{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.bt-lbl{font-size:9px;color:var(--sub);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.b-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--bd)88}
.bf-item{display:flex;align-items:center;gap:5px}
.bf-lbl{font-size:10px;color:var(--sub)}
.bf-val{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.freq-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}
.no-live{text-align:center;padding:32px;color:var(--sub);font-size:13px;border:1px dashed var(--bd);border-radius:14px}
.hist-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hc{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;text-align:center}
.hc-val{font-size:22px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.hc-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.hc-sub{font-size:10px;color:var(--txt2);margin-top:3px}
.funnel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fcol{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.fcol-hd{font-size:12px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.fcol-hd-n{font-size:9px;color:var(--sub);font-weight:400}
.fi{display:flex;align-items:center;gap:7px;padding:3px 0}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fi-name{font-size:11px;color:var(--txt);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-bar-w{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;max-width:72px}
.fi-bar{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.fi-n{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;width:20px;text-align:right;flex-shrink:0}
.fi-p{font-size:9px;color:var(--sub);width:28px;text-align:right;flex-shrink:0}
.qrate{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.qrate-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.qrate-val{font-size:18px;font-weight:900;font-family:'DM Mono',monospace}
.deal-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:7px;margin-top:6px}
.cmp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)55}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{font-size:12px;color:var(--txt2);width:100px;flex-shrink:0}
.cmp-cur{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;flex:1}
.cmp-hist{font-size:10px;color:var(--sub);flex:1}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.b-good{background:var(--gnbg);color:var(--green);border:1px solid #34D39928}
.b-warn{background:var(--ybg);color:var(--yellow);border:1px solid #FBBF2428}
.b-bad{background:var(--rbg);color:var(--red);border:1px solid #F8717128}
.b-neu{background:var(--s3);color:var(--sub);border:1px solid var(--bd)}
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pg{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;text-align:center}
.pg-val{font-size:24px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;margin-bottom:4px}
.pg-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.ftr{border-top:1px solid var(--bd);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;background:var(--s1);font-size:9px;color:var(--sub);padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.ref-btn{background:transparent;border:1px solid var(--bd);border-radius:5px;padding:4px 10px;color:var(--sub);font-size:9px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.ref-btn:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:680px){.b-kpis{grid-template-columns:repeat(2,1fr)}.hist-row{grid-template-columns:1fr 1fr}.funnel-grid{grid-template-columns:1fr}.pipe-grid{grid-template-columns:repeat(2,1fr)}.b-name{font-size:14px}}
@media(max-width:380px){.b-kpis{grid-template-columns:repeat(2,1fr)}.bk-val{font-size:18px}.hist-row{grid-template-columns:1fr}.pipe-grid{grid-template-columns:repeat(2,1fr)}.main{padding:12px 14px}}
</style>
</head>

const fEGP = n => 'EGP ' + Math.round(n).toLocaleString('en');
const fK   = n => n>=1000?(n/1000).toFixed(1)+'K':String(n);
const pct  = (a,b) => b>0?Math.round(a/b*100):0;
const ctrC = v => v>=1.5?'var(--green)':v>=1.0?'var(--yellow)':'var(--red)';
const cplC = v => v<600?'var(--green)':v<900?'var(--yellow)':'var(--red)';
const freqC= v => v>=2.5?'var(--red)':v>=2.0?'var(--yellow)':'var(--green)';

let S = { camps: FB_CAMPS, hs: FB_HS, lastSync: null };

// ═══ DATA LOAD ═══
async function loadAll() {
  const syncEl = document.getElementById('sync');
  syncEl.textContent='Syncing...'; syncEl.style.color='var(--yellow)';
  try {
    const mr = await fetch('/api/meta',{cache:'no-store'});
    if(mr.ok){const d=await mr.json();if(d.campaigns?.length){S.camps=d.campaigns;metaLive=true;}}
  }catch(e){metaLive=false;}
  try {
    const hr = await fetch('/api/hubspot',{cache:'no-store'});
    if(hr.ok){
      const d=await hr.json();
      if(d.contacts?.length){
        const ov={},bc={};
        d.contacts.forEach(c=>{
          const st=c.leadStage||'Unknown';
          ov[st]=(ov[st]||0)+1;
          if(c.campaign){if(!bc[c.campaign])bc[c.campaign]={};bc[c.campaign][st]=(bc[c.campaign][st]||0)+1;}
        });
        S.hs={total:d.total,overall:ov,byCampaign:bc};
        hsLive=true;
      }
    }
  }catch(e){hsLive=false;}
  S.lastSync=new Date();
  const t=S.lastSync.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
  if(metaLive&&hsLive){syncEl.textContent='✓ Live · '+t;syncEl.style.color='var(--green)';}
  else if(metaLive||hsLive){syncEl.textContent='⚠ Partial · '+t;syncEl.style.color='var(--yellow)';}
  else{syncEl.textContent='Cached · '+t;syncEl.style.color='var(--txt2)';}
  render();
}

function banner(c,histAvgCPL,histAvgCTR,histBestCPL){

  const todayCPL=t&&t.leads>0?Math.round(t.spend/t.leads):null;
  const todayVsAvg=todayCPL?(todayCPL<c.cpl?`<span style="color:var(--green);font-size:10px">↓ Better than avg</span>`:`<span style="color:var(--red);font-size:10px">↑ Above avg</span>`):'';
  const burnPct=c.dailyAvg>0&&t?Math.round(t.spend/c.dailyAvg*100):null;
  return `<div class="banner">
    <div class="b-top"><div class="b-name">${c.name}</div><div class="b-live"><div class="lpulse"></div><span>LIVE</span></div></div>
    <div class="b-kpis">
      <div class="bk"><div class="bk-val" style="color:var(--teal)">${c.leads}</div><div class="bk-lbl">Total Leads</div>${t?`<div class="bk-sub">+${t.leads} today</div>`:''}</div>
      <div class="bk"><div class="bk-val" style="color:${cplC(c.cpl)}">${fEGP(c.cpl)}</div><div class="bk-lbl">Cost Per Lead</div>${todayCPL?`<div class="bk-sub">${fEGP(todayCPL)} today ${todayVsAvg}</div>`:''}</div>
      <div class="bk"><div class="bk-val" style="color:${ctrC(c.ctr)}">${c.ctr.toFixed(2)}%</div><div class="bk-lbl">CTR</div>${t?`<div class="bk-sub">${t.ctr.toFixed(2)}% today</div>`:''}</div>

function funnelCol(name,stages,total,label,accent){
  const entries=Object.entries(stages).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const hot=(stages['Qualified']||0)+(stages['Meeting']||0)+(stages['Site Visit']||0);
  const qr=pct(hot,total);
  const be=stages['Bought Elsewhere']||0, ab=stages['Already Bought']||0;
  return `<div class="fcol">
    <div class="fcol-hd" style="color:${accent}">${label}<span class="fcol-hd-n">${total} leads</span></div>
    ${total===0?`<div style="color:var(--sub);font-size:11px;text-align:center;padding:20px">No leads yet</div>`
    :entries.map(([s,n])=>{const c=STAGE[s]||'#3D5068';const p=pct(n,total);return`<div class="fi"><div class="fi-dot" style="background:${c}"></div><div class="fi-name">${s}</div><div class="fi-bar-w"><div class="fi-bar" style="width:${p}%;background:${c}"></div></div><div class="fi-n" style="color:${c}">${n}</div><div class="fi-p">${p}%</div></div>`;
    }).join('')}
    <div class="qrate"><span class="qrate-lbl">Qualify Rate</span><span class="qrate-val" style="color:${accent}">${qr}%</span></div>
    ${ab?`<div class="deal-row" style="background:var(--gnbg);border-left:2px solid var(--mint)"><div><div style="font-size:12px;font-weight:700;color:var(--txt)">Already Bought</div><div style="font-size:9px;color:var(--sub);margin-top:2px">Came in after buying · not Maskan's deal</div></div><div style="font-size:15px;font-weight:900;color:var(--mint);font-family:'DM Mono',monospace">${ab}</div></div>`:''}
    ${be?`<div class="deal-row" style="background:var(--rbg);border-left:2px solid var(--red)"><div><div style="font-size:12px;font-weight:700;color:var(--txt)">Bought Elsewhere</div><div style="font-size:9px;color:var(--sub);margin-top:2px">Maskan worked lead · lost to competitor</div></div><div style="font-size:15px;font-weight:900;color:var(--red);font-family:'DM Mono',monospace">${be}</div></div>`:''}
  </div>`;
}

function comparison(c,histAvgCPL,histAvgCTR,histBestCPL){
  const ov=S.hs.overall,tot=S.hs.total;
  const histQR=pct((ov['Qualified']||0)+(ov['Meeting']||0)+(ov['Site Visit']||0),tot);
  const cs=S.hs.byCampaign?.[c.name]||{};
  const curHot=(cs['Qualified']||0)+(cs['Meeting']||0)+(cs['Site Visit']||0);
  const curQR=pct(curHot,c.leads||1);
  const rows=[
    {lbl:'CPL',cur:fEGP(Math.round(c.cpl)),hist:`Hist avg ${fEGP(histAvgCPL)} · Best ${fEGP(Math.round(histBestCPL))}`,badge:c.cpl<=histBestCPL?{t:'🏆 Best ever',cls:'b-good'}:c.cpl<histAvgCPL?{t:'↓ Better than avg',cls:'b-good'}:{t:'↑ Above avg',cls:'b-bad'},color:cplC(c.cpl)},
    {lbl:'CTR',cur:c.ctr.toFixed(2)+'%',hist:`Hist avg ${histAvgCTR}%`,badge:c.ctr>parseFloat(histAvgCTR)?{t:'↑ Above avg',cls:'b-good'}:{t:'↓ Below avg',cls:'b-bad'},color:ctrC(c.ctr)},
    {lbl:'Qualify Rate',cur:curQR+'%',hist:`${histQR}% account avg`,badge:curQR>histQR?{t:'↑ Better quality',cls:'b-good'}:{t:'↓ Below avg',cls:'b-warn'},color:curQR>histQR?'var(--green)':'var(--yellow)'},
    {lbl:'Frequency',cur:c.freq.toFixed(2)+'x',hist:'Concern >2.5x · Warning >2.0x',badge:c.freq>=2.5?{t:'⚠️ Fatigue',cls:'b-bad'}:c.freq>=2.0?{t:'⚡ Watch',cls:'b-warn'}:{t:'✓ Healthy',cls:'b-good'},color:freqC(c.freq)},
    {lbl:'Days Running',cur:c.daysRunning+'d',hist:`Daily avg ${fEGP(c.dailyAvg)}`,badge:{t:'Established',cls:'b-neu'},color:'var(--txt)'},
  ];
  return rows.map(r=>`<div class="cmp-row"><span class="cmp-lbl">${r.lbl}</span><span class="cmp-cur" style="color:${r.color}">${r.cur}</span><span class="cmp-hist">${r.hist}</span><span class="badge ${r.badge.cls}">${r.badge.t}</span></div>`).join('');
}

function sortedCamps() {
  return [...S.camps].sort((a,b)=>{
    const o={ACTIVE:0,COMPLETED:1};
    return (o[a.status]??2)-(o[b.status]??2)||b.leads-a.leads;
  });
}

    <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:12px;padding:8px;color:${cplC(c.cpl)}">${c.leads>0?fEGP(c.cpl):'—'}</td>
    <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:12px;padding:8px;color:${ctrC(c.ctr)}">${c.ctr>0?c.ctr.toFixed(2)+'%':'—'}</td>
    <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:12px;padding:8px;color:${engC}">${eng>=1000?(eng/1000).toFixed(1)+'K':eng||'—'}</td>
  </tr>`;
}
function tick(){
  const t=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clk').textContent=t;
  const f=document.getElementById('ftr-clk');if(f)f.textContent='Auto-refresh 5min · '+t;
}

// ═══ INIT ═══
render();
document.getElementById('sync').textContent='Using cached data — syncing...';
tick(); setInterval(tick,1000);
loadAll(); setInterval(loadAll,5*60*1000);
</script>
</body>
</html>
